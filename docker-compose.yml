services:

  # ─── PHP-FPM Application ───────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: book-library-app
    restart: unless-stopped
    working_dir: /var/www
    # Mount source code so changes reflect without rebuilding the image
    volumes:
      - .:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    networks:
      - book-library
    depends_on:
      db:
        # Wait for MySQL to be healthy before starting the app
        condition: service_healthy
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: book_library
      DB_USERNAME: book_user
      DB_PASSWORD: secret
      L5_SWAGGER_GENERATE_ALWAYS: "true"

  # ─── Nginx Web Server ──────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: book-library-nginx
    restart: unless-stopped
    ports:
      # Application is available at http://localhost:8081
      - "8081:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - book-library
    depends_on:
      - app

  # ─── MySQL Database ────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: book-library-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: book_library
      MYSQL_USER: book_user
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    ports:
      # Also exposed on host for direct DB access with a client (optional)
      - "3307:3306"
    volumes:
      # Named volume persists data across container restarts
      - db-data:/var/lib/mysql
    networks:
      - book-library
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootsecret"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

# ─── Shared network ───────────────────────────────────────────────────────────
networks:
  book-library:
    driver: bridge

# ─── Named volumes ────────────────────────────────────────────────────────────
volumes:
  db-data:
    driver: local
